<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Language Detection</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #94a3b8;
            margin-bottom: 20px;
        }

        video {
            width: 400px;
            border-radius: 10px;
            border: 3px solid #38bdf8;
        }

        .buttons {
            margin-top: 20px;
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }

        #prediction {
            margin-top: 15px;
            font-size: 20px;
            color: #22c55e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🤟 Sign Language Detection</h1>
    <p>Real-time hand gesture recognition</p>

    <video id="webcam" autoplay playsinline></video>
    
    <h2 id="prediction">Waiting...</h2>

    
    <div class="buttons">
        <button onclick="startCamera()">▶ Start Camera</button>
        <button onclick="stopCamera()">⏹ Stop Camera</button>
    </div>

    <div id="prediction">
        Gesture: —
    </div>
</div>

<script>
    let video = document.getElementById("webcam");
    let stream = null;

    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        } catch (err) {
            alert("❌ Cannot access camera");
        }
    }

    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }
    }

    // Dummy prediction (replace later with backend)
    setInterval(() => {
        const gestures = ["hello", "thanks", "you", "me", "goodbye"];
        const random = gestures[Math.floor(Math.random() * gestures.length)];
        document.getElementById("prediction").innerText = "Gesture: " + random;
    }, 2000);

    
</script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script src="script.js"></script>  
</body>
</html>
